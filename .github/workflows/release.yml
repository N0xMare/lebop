name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            asset: lebop-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            asset: lebop-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: lebop-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: lebop-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install --frozen-lockfile

      - name: compile
        run: |
          bun build ./bin/lebop.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile ${{ matrix.asset }}

      - name: smoke
        run: |
          ./${{ matrix.asset }} --version
          ./${{ matrix.asset }} --help > /dev/null

      - name: sha256
        run: |
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: aggregate SHA256SUMS
        working-directory: dist
        run: |
          cat ./*.sha256 > SHA256SUMS
          rm ./*.sha256

      - name: publish (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          notes_file=".github/release-notes/${tag}.md"
          if [ -f "$notes_file" ]; then
            notes_args=(--notes-file "$notes_file")
          else
            notes_args=(--generate-notes)
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag exists; uploading assets with --clobber"
            gh release upload "$tag" --clobber ./dist/*
          else
            gh release create "$tag" \
              --title "$tag" \
              "${notes_args[@]}" \
              ./dist/*
          fi
