name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            asset: lebop-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: lebop-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: lebop-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: lebop-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install --frozen-lockfile

      - name: compile
        run: |
          bun build ./bin/lebop \
            --compile \
            --target=${{ matrix.target }} \
            --outfile ${{ matrix.asset }}

      - name: sha256
        run: |
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: aggregate SHA256SUMS
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: extract release notes from CHANGELOG
        run: |
          awk '/^## \[/{if(p)exit; p=1} p' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${{ github.ref_name }}" > /tmp/release-notes.md
          fi

      - name: publish (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag exists; uploading assets with --clobber"
            gh release upload "$tag" --clobber dist/*
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file /tmp/release-notes.md \
              dist/*
          fi
