name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate every release on the same correctness checks that CI runs on `main`.
  # Without this, `git tag v0.0.X && git push --tags` from an unreviewed
  # branch would publish without typecheck/biome/test ever running.
  gate:
    name: gate (test + typecheck + biome + version-tag match)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: install deps
        run: bun install --frozen-lockfile
      - name: assert package.json.version matches tag
        # Tagging v0.0.3 with package.json still saying "0.0.2" would publish a
        # binary that lies about its own --version. Fail fast.
        run: |
          tag="${{ github.ref_name }}"
          expected="${tag#v}"
          actual=$(node -e 'process.stdout.write(require("./package.json").version)')
          if [ "$actual" != "$expected" ]; then
            echo "::error::tag $tag implies version $expected, but package.json says $actual"
            exit 1
          fi
      - name: typecheck
        run: bun run typecheck
      - name: biome
        run: bun run check
      - name: tests
        run: bun run test

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: gate
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            asset: lebop-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            asset: lebop-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: lebop-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: lebop-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install --frozen-lockfile

      - name: compile
        run: |
          bun build ./bin/lebop.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile ${{ matrix.asset }}

      - name: smoke
        # `--version` and `--help` both short-circuit before any subcommand
        # registration runs, so they wouldn't catch a binary that crashes the
        # moment it tries to load a real command. Exercise the subcommand
        # tree (forces every `register*` import to evaluate) AND verify the
        # MCP stdio transport can handshake — both are pre-auth so they can
        # run in CI without credentials.
        run: |
          ./${{ matrix.asset }} --version
          ./${{ matrix.asset }} --help > /dev/null
          ./${{ matrix.asset }} list --help > /dev/null
          ./${{ matrix.asset }} plan --help > /dev/null
          ./${{ matrix.asset }} mcp --help > /dev/null
          ./${{ matrix.asset }} project --help > /dev/null
          ./${{ matrix.asset }} initiative --help > /dev/null
          # MCP stdio handshake: pipe `initialize` in, expect a JSON-RPC reply
          # whose first line contains `protocolVersion`. `head -n1` SIGPIPEs
          # the server once it gets the response — no dependency on the
          # `timeout(1)` coreutil (which is GNU-only and not guaranteed on
          # macOS runners). `sleep 5` keeps stdin open long enough for the
          # server to write before SIGPIPE.
          {
            printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"release-smoke","version":"1"}}}'
            sleep 5
          } | ./${{ matrix.asset }} mcp 2>/dev/null | head -n1 | grep -q '"protocolVersion"' \
            || { echo "::error::MCP initialize handshake failed"; exit 1; }

      - name: sha256
        run: |
          shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: aggregate SHA256SUMS
        working-directory: dist
        run: |
          cat ./*.sha256 > SHA256SUMS
          rm ./*.sha256

      - name: publish (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          notes_file=".github/release-notes/${tag}.md"
          if [ -f "$notes_file" ]; then
            notes_args=(--notes-file "$notes_file")
          else
            notes_args=(--generate-notes)
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag exists; uploading assets with --clobber"
            gh release upload "$tag" --clobber ./dist/*
          else
            gh release create "$tag" \
              --title "$tag" \
              "${notes_args[@]}" \
              ./dist/*
          fi
