name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install --frozen-lockfile

      - name: verify workflow action refs
        run: node scripts/check-npm-pack.mjs --workflow-action-refs

      - name: install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: actionlint
        run: actionlint .github/workflows/*.yml

      - name: biome
        run: bun run check

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun run test

      - name: package dry-run
        run: bun run check:package

      - name: compiled binary smoke
        run: |
          set -euo pipefail
          bun build ./bin/lebop.ts --compile --outfile lebop-ci-smoke
          expected_version="$(node -p "require('./package.json').version")"
          actual_version="$(./lebop-ci-smoke --version | tr -d '\r\n')"
          if [ "$actual_version" != "$expected_version" ]; then
            echo "::error::compiled binary reported $actual_version, expected $expected_version"
            exit 1
          fi
          ./lebop-ci-smoke --help > /dev/null
          ./lebop-ci-smoke workspace --help > /dev/null
          {
            printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1"}}}'
          } | timeout 12 ./lebop-ci-smoke mcp > mcp-initialize.json
          EXPECTED_VERSION="$expected_version" node -e '
            const fs = require("node:fs");
            const lines = fs.readFileSync("mcp-initialize.json", "utf8").trim().split(/\n+/).filter(Boolean);
            if (lines.length !== 1) throw new Error("expected one MCP response line, got " + lines.length);
            const msg = JSON.parse(lines[0]);
            if (msg.result?.protocolVersion !== "2024-11-05") throw new Error("MCP initialize protocolVersion mismatch");
            if (msg.result?.serverInfo?.version !== process.env.EXPECTED_VERSION) throw new Error("MCP serverInfo.version mismatch");
          '
