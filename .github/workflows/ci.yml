name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: install deps
        run: bun install --frozen-lockfile

      - name: biome
        run: bun run check

      - name: typecheck
        run: bun run typecheck

      - name: test
        run: bun run test
